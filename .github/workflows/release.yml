name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 musl cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc /usr/local/bin/aarch64-linux-musl-gcc
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../lhi-${{ matrix.target }}.tar.gz lhi
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../lhi-${{ matrix.target }}.zip lhi.exe

      - uses: actions/upload-artifact@v4
        with:
          name: lhi-${{ matrix.target }}
          path: lhi-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: lhi-*
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dnatag/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_DARWIN=$(sha256sum artifacts/lhi-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64_DARWIN=$(sha256sum artifacts/lhi-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(sha256sum artifacts/lhi-aarch64-unknown-linux-musl.tar.gz | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(sha256sum artifacts/lhi-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/lhi.rb

          # Replace sha256 lines in order: aarch64-darwin, x86_64-darwin, aarch64-linux, x86_64-linux
          awk -v s1="$SHA_AARCH64_DARWIN" -v s2="$SHA_X86_64_DARWIN" \
              -v s3="$SHA_AARCH64_LINUX"  -v s4="$SHA_X86_64_LINUX" '
            /sha256/ { n++; sub(/"[^"]*"$/, "\"" (n==1?s1:n==2?s2:n==3?s3:s4) "\"") }
            { print }
          ' Formula/lhi.rb > Formula/lhi.rb.tmp && mv Formula/lhi.rb.tmp Formula/lhi.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lhi.rb
          git commit -m "lhi ${GITHUB_REF_NAME}"
          git push

  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: |
          tag=$(curl -sSL -o /dev/null -w '%{url_effective}' https://github.com/rust-lang/mdBook/releases/latest | grep -oP '[^/]+$')
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv mdbook /usr/local/bin/
      - run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: doc/book
      - id: deploy
        uses: actions/deploy-pages@v4
